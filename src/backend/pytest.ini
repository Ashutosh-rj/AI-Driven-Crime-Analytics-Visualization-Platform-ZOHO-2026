[pytest]
# ─── PATH FIX ────────────────────────────────────────────────────────────────
# Adds src/backend to sys.path so pytest can resolve `from main import app`,
# `from core.database import ...`, etc. when run from src/backend/.
# This is what was causing: ModuleNotFoundError: No module named 'main'
pythonpath = .

# ─── Test Discovery ───────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Async ────────────────────────────────────────────────────────────────────
asyncio_mode = auto

# ─── Timeout (prevents CI from hanging on LLM/DB calls) ─────────────────────
timeout = 30

# ─── Output ───────────────────────────────────────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -q

# ─── Markers ─────────────────────────────────────────────────────────────────
markers =
    integration: marks tests that require live services (deselect with -m "not integration")
    slow: marks tests expected to take > 5s
