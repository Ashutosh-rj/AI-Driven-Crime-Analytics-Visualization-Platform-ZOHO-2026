version: '3.8'

services:
  ksp-backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: ksp-ai-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  ksp-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ksp-ai-frontend
    ports:
      - "5173:5173"
    depends_on:
      - ksp-backend
    restart: unless-stopped
