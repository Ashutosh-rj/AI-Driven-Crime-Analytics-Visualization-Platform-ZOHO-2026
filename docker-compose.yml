
services:
  ksp-backend-v3:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: datathon2026-ksp-backend:latest
    container_name: ksp-ai-backend-v3
    volumes:
      - ./src/backend:/app/src/backend
    ports:
      - "8000:8000"
    networks:
      - external_net
      - internal_net
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - DATABASE_URL=${DATABASE_URL:-postgresql://ksp_admin:ksp_password@postgres:5432/ksp_db}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_started
      neo4j:
        condition: service_started
      redpanda:
        condition: service_started
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  ksp-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ksp-ai-frontend
    ports:
      - "5173:5173"
    networks:
      - external_net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - ksp-backend-v3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  ksp-ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: ksp-ai-ml
    ports:
      - "8001:8001"
    networks:
      - internal_net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  neo4j:
    image: neo4j:5
    container_name: ksp-ai-neo4j
    ports:
      - "7474:7474" 
      - "7687:7687" 
    networks:
      - internal_net
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "http://localhost:7474", "-O", "-"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G

  postgres:
    image: postgis/postgis:15-3.3
    container_name: ksp-ai-postgres
    ports:
      - "5432:5432"
    networks:
      - internal_net
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ksp_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ksp_password}
      - POSTGRES_DB=${POSTGRES_DB:-ksp_db}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ksp_admin -d ksp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: ksp-ai-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    networks:
      - internal_net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ksp-ai-qdrant
    ports:
      - "6333:6333"
    networks:
      - internal_net
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: ksp-ai-prometheus
    ports:
      - "9090:9090"
    networks:
      - internal_net
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ksp-ai-grafana
    ports:
      - "3000:3000"
    networks:
      - internal_net
      - external_net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ksp-ai-redis
    ports:
      - "6379:6379"
    networks:
      - internal_net
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: ksp-ai-keycloak
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ksp_db}
      - KC_DB_USERNAME=${POSTGRES_USER:-ksp_admin}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD:-ksp_password}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    command: start-dev
    ports:
      - "8080:8080"
    networks:
      - internal_net
      - external_net
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:

networks:
  external_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true
