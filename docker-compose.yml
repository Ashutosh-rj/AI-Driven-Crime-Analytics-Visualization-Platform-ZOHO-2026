version: '3.8'

services:
  ksp-backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: ksp-ai-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - DATABASE_URL=postgresql://ksp_admin:ksp_password@postgres:5432/ksp_db
    depends_on:
      - neo4j
      - postgres
    restart: unless-stopped

  ksp-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ksp-ai-frontend
    ports:
      - "5173:5173"
    depends_on:
      - ksp-backend
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: ksp-ai-neo4j
    ports:
      - "7474:7474" 
      - "7687:7687" 
    environment:
      - NEO4J_AUTH=neo4j/password
    restart: unless-stopped

  postgres:
    image: postgis/postgis:15-3.3
    container_name: ksp-ai-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ksp_admin
      - POSTGRES_PASSWORD=ksp_password
      - POSTGRES_DB=ksp_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
