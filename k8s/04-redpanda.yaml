apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:latest
          command:
            - redpanda
            - start
            - --smp
            - "1"
            - --memory
            - 1G
            - --reserve-memory
            - 0M
            - --overprovisioned
            - --node-id
            - "0"
            - --kafka-addr
            - internal://0.0.0.0:9092,external://0.0.0.0:19092
            - --advertise-kafka-addr
            - internal://redpanda:9092,external://localhost:19092
          ports:
            - containerPort: 9092
            - containerPort: 19092
            - containerPort: 9644
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
spec:
  ports:
    - port: 9092
      name: internal
    - port: 19092
      name: external
    - port: 9644
      name: admin
  selector:
    app: redpanda
