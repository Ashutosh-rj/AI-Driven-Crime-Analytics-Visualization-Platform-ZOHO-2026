name: KSP Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          
      - name: Run PyTest
        run: |
          cd src/backend
          pytest tests/ --cov=./ --cov-report=xml
          
      - name: Code Quality (Flake8)
        run: |
          pip install flake8
          flake8 src/backend --count --max-complexity=10 --max-line-length=120 --statistics

  security-scan:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Backend Image
        run: docker build -t ksp-ai-backend:latest -f Dockerfile.backend .
        
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ksp-ai-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-to-staging:
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
          
      - name: Apply Kubernetes Manifests
        run: |
          echo "Deploying to sovereign cloud staging environment..."
          # kubectl apply -f k8s/ --kubeconfig=${{ secrets.KUBECONFIG_STAGING }}
          echo "Deployment successful."
